<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript">
      // If the user specifically said that they wanted dark mode, or there is
      // no preference but the OS says that the user prefers a dark color scheme,
      // then turn on dark mode.
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
    %sveltekit.head%
  </head>
  <body class="bg-slate-400 dark:bg-slate-600">
    <div>%sveltekit.body%</div>
  </body>
</html>
